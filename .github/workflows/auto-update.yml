name: WorldConflict Auto Update Pipeline

on:
  schedule:
    # Runs every 4 hours: 12AM, 4AM, 8AM, 12PM, 4PM, 8PM UTC
    - cron: '0 0,4,8,12,16,20 * * *'
  workflow_dispatch:
    inputs:
      reason:
        description: 'Manual trigger reason'
        required: false
        default: 'Manual run'

jobs:
  update:
    name: Collect, Write & Notify
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run full pipeline
        run: node scripts/run-pipeline.js
        env:
          FIREBASE_ADMIN_PROJECT_ID: ${{ secrets.FIREBASE_ADMIN_PROJECT_ID }}
          FIREBASE_ADMIN_CLIENT_EMAIL: ${{ secrets.FIREBASE_ADMIN_CLIENT_EMAIL }}
          FIREBASE_ADMIN_PRIVATE_KEY: ${{ secrets.FIREBASE_ADMIN_PRIVATE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          NEXT_PUBLIC_SITE_URL: https://worldconflict.online

      - name: Pipeline success notification
        if: success()
        run: echo "✅ Pipeline completed at $(date)"

      - name: Pipeline failure notification
        if: failure()
        run: echo "❌ Pipeline failed at $(date)"
